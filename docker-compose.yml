services:
  api:
    container_name: onpyrunner-api
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["uvicorn", "onpyrunner_api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - ljweel-dev-network


  worker:
    networks:
      - ljweel-dev-network
    privileged: true
    stop_grace_period: 1s
    cgroup: host
    restart: on-failure
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["python", "-m", "onpyrunner_worker.main"]
    deploy:
      resources:
        limits:
          cpus: 1.2


  redis:
    image: redis:7
    networks:
      - ljweel-dev-network



networks:
  ljweel-dev-network:
    external: true
    name: ljweel-dev-network

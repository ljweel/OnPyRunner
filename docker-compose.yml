services:
  api:
    container_name: onpyrunner-api
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_URL: ${POSTGRES_URL}
      SYNC_POSTGRES_URL: ${SYNC_POSTGRES_URL}
    command: ["uvicorn", "onpyrunner_api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - ljweel-dev-network


  worker:
    networks:
      - ljweel-dev-network
    privileged: true
    stop_grace_period: 1s
    cgroup: host
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_URL: ${POSTGRES_URL}
    command: ["python", "-m", "onpyrunner_worker.main"]
    deploy:
      resources:
        limits:
          cpus: 1.2


  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ljweel-dev-network

  db:
    image: postgres:16-alpine
    networks:
      - ljweel-dev-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_URL: ${POSTGRES_URL}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

networks:
  ljweel-dev-network:
    external: true
    name: ljweel-dev-network

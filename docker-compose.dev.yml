services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["uvicorn", "onpyrunner_api.app:app", "--host", "0.0.0.0", "--port", "8000"]

    develop:
      watch:
        - action: rebuild
          path: ./api/src
        - action: rebuild
          path: ./shared/src
        - action: rebuild
          path: ./api/pyproject.toml

  worker:
    privileged: true
    cgroup: host
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["python", "-m", "onpyrunner_worker.main"]

    develop:
      watch:
        - action: rebuild
          path: ./worker/src
        - action: rebuild
          path: ./shared/src
        - action: rebuild
          path: ./worker/pyproject.toml

  redis:
    image: redis:7

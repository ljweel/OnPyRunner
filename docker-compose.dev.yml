services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_URL: ${POSTGRES_URL}
      SYNC_POSTGRES_URL: ${SYNC_POSTGRES_URL}
    command: ["uvicorn", "onpyrunner_api.app:app", "--host", "0.0.0.0", "--port", "8000"]

    develop:
      watch:
        - action: rebuild
          path: ./api/src
        - action: rebuild
          path: ./shared/src
        - action: rebuild
          path: ./api/pyproject.toml

  worker:
    privileged: true
    cgroup: host
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_URL: ${POSTGRES_URL}
    command: ["python", "-m", "onpyrunner_worker.main"]

    develop:
      watch:
        - action: rebuild
          path: ./worker/src
        - action: rebuild
          path: ./shared/src
        - action: rebuild
          path: ./worker/pyproject.toml

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_URL: ${POSTGRES_URL}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: